name: Daily Rune refresh

# When to run
on:
  schedule:
    # 17:00 UTC = 18:00 (6 pm) Lagos time, weekdays only
    - cron: '0 17 * * 1-5'
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

# Allow this workflow to write commits back to the repo
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml openpyxl

      - name: Run the refresh script (database only, no workbook)
        run: python ngx_refresh.py --report --db ngx.db

      - name: Commit updated ngx.db if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ngx.db
          if git diff --staged --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Auto-refresh: $(date -u +%Y-%m-%d)"
            git push
          fi
