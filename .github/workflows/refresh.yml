name: Daily refresh

# Runs the data refresh automatically so your database stays current
# even when your MacBook is off. DATABASE_URL comes from the repo secret.

on:
  schedule:
    # 17:30 UTC, Mon–Fri  (~18:30 West Africa Time, after the day's auctions)
    - cron: "30 17 * * 1-5"
  workflow_dispatch: {}   # also lets you run it manually from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh (database only)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ngx_refresh.py --report
